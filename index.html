cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAREZMİ PANEL</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./bg.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        .panel { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .brand-header { font-size: 4rem; font-weight: 900; color: #00f2ff; text-shadow: 0 0 20px rgba(0, 242, 255, 0.8); margin-bottom: 10px; }
        #task-display { font-size: 1.5rem; color: #fff; margin: 15px 0; min-height: 3rem; font-weight: 500; }
        #timer-display { font-size: 6rem; font-weight: bold; color: #ff4444; margin: 10px 0; font-family: monospace; text-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .btn-main { background: #ff0000; color: white; border: none; padding: 20px 50px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(255,0,0,0.4); }
        .btn-main:hover { transform: scale(1.05); background: #cc0000; }
        .music-box { margin-top: 30px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 25px; border: 1px solid #00f2ff; backdrop-filter: blur(5px); }
        .btn-ctrl { background: transparent; color: white; border: 1px solid #00f2ff; padding: 10px 25px; border-radius: 20px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body onload="initApp()">
    <div class="panel">
        <div class="brand-header">HAREZMİ</div>
        <div id="task-display">BAŞLAMAYA HAZIR MISIN?</div>
        <div id="timer-display">00:00</div>
        <button class="btn-main" onclick="generateTask()">YENİ GÖREV AL</button>
        <div class="music-box">
            <p id="song-name" style="color:#00f2ff; font-weight:bold;">🎵 Müzik Hazır</p>
            <button onclick="changeSong()" class="btn-ctrl">DEĞİŞTİR</button>
            <button onclick="stopMusic()" class="btn-ctrl" style="border-color:#ff4444;">KAPAT</button>
        </div>
    </div>
    <audio id="bg-audio" loop></audio>
    <script>
        const tasks = ["Matematik Problemi Çöz", "Kitap Oku", "Kod Yaz", "Kelime Ezberle", "Spor Yap", "Resim Çiz"];
        const playlist = [{n:"Lofi Beats", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"}, {n:"Deep Focus", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"}];
        let timeLeft = 0, timerId = null, songIdx = 0;
        const audio = document.getElementById('bg-audio');
        function initApp() { window.onclick = () => { if(!audio.src){ audio.src=playlist[0].s; document.getElementById('song-name').innerText="🎵 "+playlist[0].n; } audio.play(); window.onclick=null; }; }
        function changeSong() { songIdx=(songIdx+1)%playlist.length; audio.src=playlist[songIdx].s; document.getElementById('song-name').innerText="🎵 "+playlist[songIdx].n; audio.play(); }
        function stopMusic() { audio.pause(); document.getElementById('song-name').innerText="🔇 Kapalı"; }
        function generateTask() { if(timerId) clearInterval(timerId); document.getElementById('task-display').innerText = tasks[Math.floor(Math.random()*tasks.length)]; timeLeft = 25*60; timerId = setInterval(()=>{ if(timeLeft>0){ timeLeft--; updateDisp(); } },1000); }
        function updateDisp() { let m=Math.floor(timeLeft/60), s=timeLeft%60; document.getElementById('timer-display').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`; }
    </script>
</body>
</html>
EOF
git add .
git commit -m "Ekran tamamiyle temizlendi"
git push origin main --force
