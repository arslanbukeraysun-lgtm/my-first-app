cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAREZMİ PANEL</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://harezmi-snowy.vercel.app/bg.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        .panel { width: 100%; height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .brand-header { font-size: 3.5rem; font-weight: 900; color: #00f2ff; text-shadow: 0 0 20px rgba(0, 242, 255, 0.6); margin-bottom: 5px; }
        #timer-display { font-size: 5rem; font-weight: bold; color: #ff4444; margin: 10px 0; font-family: monospace; }
        .btn-main { background: #ff0000; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .music-control { margin-top: 15px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; border: 1px solid #00f2ff; }
        .btn-control { background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; padding: 8px 18px; border-radius: 20px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body onload="initApp()">
    <div class="panel">
        <div class="brand-header">HAREZMİ</div>
        <div id="task-display" style="font-size: 1.2rem; color: #ccc;">ODAKLANMAYA HAZIR MISIN?</div>
        <div id="timer-display">00:00</div>
        <button class="btn-main" onclick="generateTask()">YENİ GÖREV AL</button>
        <div class="music-control">
            <p id="song-name" style="font-size: 0.9rem; color: #00f2ff;">🎵 Müzik Hazır (Dokun)</p>
            <button onclick="changeSong()" class="btn-control" style="border-color:#00f2ff;">DEĞİŞTİR</button>
            <button onclick="stopMusic()" class="btn-control" style="border-color:#ff4444;">KAPAT</button>
        </div>
    </div>
    <audio id="bg-audio" loop></audio>
    <script>
        const tasks = [{t:"Matematik Çalış", d:25}, {t:"Kitap Oku", d:20}, {t:"Yazılım Geliştir", d:30}, {t:"Kelime Ezberle", d:15}];
        const playlist = [{n:"Piyano", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},{n:"Yağmur", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"}];
        let timeLeft = 0, timerId = null, songIndex = 0;
        const audio = document.getElementById('bg-audio');
        function initApp() { window.onclick = () => { if(!audio.src) { audio.src = playlist[0].s; document.getElementById('song-name').innerText = "🎵 " + playlist[0].n; } audio.play(); window.onclick = null; }; }
        function changeSong() { songIndex = (songIndex + 1) % playlist.length; document.getElementById('song-name').innerText = "🎵 " + playlist[songIndex].n; audio.src = playlist[songIndex].s; audio.play(); }
        function stopMusic() { audio.pause(); document.getElementById('song-name').innerText = "🔇 Kapalı"; }
        function generateTask() { if(timerId) clearInterval(timerId); const r = tasks[Math.floor(Math.random()*tasks.length)]; document.getElementById('task-display').innerText = r.t; timeLeft = r.d * 60; timerId = setInterval(() => { if(timeLeft > 0) { timeLeft--; updateDisplay(); } }, 1000); }
        function updateDisplay() { let m=Math.floor(timeLeft/60), s=timeLeft%60; document.getElementById('timer-display').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`; }
    </script>
</body>
</html>
EOF
