cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAREZMİ PANEL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Arka plan fotoğrafını tam ekran ve temiz yapan kısım */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('./bg.jpg');
            background-size: cover; background-position: center; z-index: 1;
        }

        /* Paneli tam ortaya sabitleyen şeffaf kap */
        .container {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white;
        }

        .brand-text { font-size: 3.5rem; font-weight: 900; color: #00f2ff; text-shadow: 0 0 20px rgba(0, 242, 255, 0.8); margin-bottom: 5px; }
        .sub-text { font-size: 1.2rem; margin-bottom: 20px; font-weight: 500; text-transform: uppercase; }
        .timer { font-size: 6rem; font-weight: bold; color: #ff4444; margin: 10px 0; font-family: monospace; }
        .btn-main { background: #ff0000; color: white; border: none; padding: 15px 45px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin: 20px 0; }
        
        /* Müzik paneli tasarımı */
        .music-panel {
            background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 25px;
            border: 1px solid rgba(0, 242, 255, 0.5); backdrop-filter: blur(10px);
            width: 80%; max-width: 350px;
        }
        .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .btn-small { background: transparent; color: white; border: 1px solid #00f2ff; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body onload="startApp()">
    <div class="bg-overlay"></div>
    <div class="container">
        <h1 class="brand-text">HAREZMİ</h1>
        <p class="sub-text" id="task-info">ODAKLANMAYA HAZIR MISIN?</p>
        <div class="timer" id="time-display">00:00</div>
        <button class="btn-main" onclick="getTask()">YENİ GÖREV AL</button>
        
        <div class="music-panel">
            <p id="m-status" style="color:#00f2ff;">🎵 Müzik Hazır (Dokun)</p>
            <div class="btn-row">
                <button class="btn-small" onclick="nextM()">DEĞİŞTİR</button>
                <button class="btn-small" onclick="stopM()" style="border-color:#ff4444;">KAPAT</button>
            </div>
        </div>
    </div>
    <audio id="audio-player" loop></audio>

    <script>
        const tasks = ["Matematik Çalış", "Kitap Oku", "Kod Yaz", "Kelime Ezberle", "Resim Çiz", "Spor Yap"];
        const songs = [
            {n:"Lofi", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
            {n:"Focus", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"}
        ];
        let seconds = 0, timer = null, sIdx = 0;
        const player = document.getElementById('audio-player');

        function startApp() {
            window.onclick = () => {
                if(!player.src) {
                    player.src = songs[0].s;
                    document.getElementById('m-status').innerText = "🎵 " + songs[0].n;
                }
                player.play();
                window.onclick = null;
            };
        }

        function nextM() {
            sIdx = (sIdx + 1) % songs.length;
            player.src = songs[sIdx].s;
            document.getElementById('m-status').innerText = "🎵 " + songs[sIdx].n;
            player.play();
        }

        function stopM() { player.pause(); document.getElementById('m-status').innerText = "🔇 Kapalı"; }

        function getTask() {
            if(timer) clearInterval(timer);
            document.getElementById('task-info').innerText = tasks[Math.floor(Math.random()*tasks.length)];
            seconds = 25 * 60;
            timer = setInterval(() => {
                if(seconds > 0) {
                    seconds--;
                    let m = Math.floor(seconds/60), s = seconds%60;
                    document.getElementById('time-display').innerText = (m<10?'0'+m:m)+":"+(s<10?'0'+s:s);
                }
            }, 1000);
        }
    </script>
</body>
</html>
EOF
git add .
git commit -m "Ekrandaki tum yazilar temizlendi ve tasarım sabitlendi"
git push origin main --force
