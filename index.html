cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAREZMİ ODAK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./bg.jpg');
            background-size: cover; background-position: center; z-index: 1;
        }
        .main {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .panel {
            background: rgba(0, 0, 0, 0.8); border: 2px solid #00f2ff;
            padding: 35px 25px; border-radius: 40px; text-align: center;
            width: 88%; max-width: 440px; backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
        }
        h1 { font-size: 3.5rem; color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin-bottom: 10px; }
        #task { font-size: 1.2rem; color: #fff; margin: 15px 0; min-height: 3.5rem; font-weight: 500; display: flex; align-items: center; justify-content: center; }
        #timer { font-size: 6rem; font-weight: bold; color: #ff4444; margin: 10px 0; font-family: monospace; }
        .btn-main { background: #ff0000; color: #fff; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin: 10px 0; }
        .m-box { margin-top: 25px; border-top: 1px solid rgba(0,242,255,0.2); padding-top: 20px; }
        .btn-m { background: transparent; color: #fff; border: 1px solid #00f2ff; padding: 10px 20px; border-radius: 20px; margin: 5px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body onload="init()">
    <div class="bg"></div>
    <div class="main">
        <div class="panel">
            <h1>HAREZMİ</h1>
            <div id="task">ODAKLANMAYA HAZIR MISIN?</div>
            <div id="timer">00:00</div>
            <button class="btn-main" onclick="start()">YENİ GÖREV AL</button>
            <div class="m-box">
                <p id="m-status" style="color:#00f2ff; margin-bottom:12px; font-weight:bold;">🎵 Müzik Hazır</p>
                <button onclick="next()" class="btn-m">DEĞİŞTİR</button>
                <button onclick="stop()" class="btn-m" style="border-color:#ff4444;">DURDUR</button>
            </div>
        </div>
    </div>
    <audio id="player" loop></audio>
    <script>
        const tasks = [
            "Matematik: 15 Soru Çöz", "Kitap: 20 Sayfa Oku", "Kodlama: Yeni Fonksiyon Yaz", "İngilizce: 15 Kelime Ezberle",
            "Tarih: Bir Konu Özeti Çıkar", "Fizik: 5 Formül Ezberle", "Kimya: Elementleri Tekrar Et", "Biyoloji: Hücre Çizimi Yap",
            "Edebiyat: Bir Şiir Oku", "Spor: 20 Şınav Çek", "Su İç: Büyük Bir Bardak", "Düzen: Masanı Toparla",
            "Yazılım: GitHub Commit Yap", "E-posta: Kutunu Temizle", "Mantık: Bir Bilmece Çöz", "Harezmi: Algoritma Araştır",
            "İngilizce: Kısa Bir Çeviri", "Türkçe: Yazım Kuralları", "Coğrafya: Ülke Bulmaca", "Yazılım: CSS Grid Bak",
            "Fizik: Newton Yasaları", "Biyoloji: Bitki Yapısı", "Edebiyat: Yazar Hayatı", "Matematik: Karekök Çalış",
            "Teknoloji: Yapay Zeka Haberi", "Analiz: Hatalarını Yaz", "Motivasyon: Hedefini Belirle", "Hız: 1 Dakika Yazı",
            "Yazılım: Vercel Ayarları", "Matematik: Yüzde Hesapla", "İngilizce: Şarkı Çevir", "Türkçe: Paragraf Çöz"
        ];
        const songs = [
            {n:"Dinlendirici Piyano", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"},
            {n:"Sakin Yağmur Sesi", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
            {n:"Derin Odaklanma", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"},
            {n:"Hafif Doğa Sesi", s:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"}
        ];
        let sec = 0, tid = null, sidx = 0;
        const p = document.getElementById('player');
        function init() { window.onclick = () => { if(!p.src){ p.src=songs[0].s; document.getElementById('m-status').innerText="🎵 "+songs[0].n; } p.play(); window.onclick=null; }; }
        function next(){ sidx=(sidx+1)%songs.length; p.src=songs[sidx].s; document.getElementById('m-status').innerText="🎵 "+songs[sidx].n; p.play(); }
        function stop(){ p.pause(); document.getElementById('m-status').innerText="🔇 Kapalı"; }
        function start(){
            if(tid) clearInterval(tid);
            document.getElementById('task').innerText = tasks[Math.floor(Math.random()*tasks.length)];
            sec = 25 * 60; // 25 Dakika
            tid = setInterval(() => {
                if(sec > 0){ sec--; let m=Math.floor(sec/60), s=sec%60; document.getElementById('timer').innerText=(m<10?'0'+m:m)+":"+(s<10?'0'+s:s); }
            }, 1000);
        }
    </script>
</body>
</html>
EOF
git add .
git commit -m "Son guncelleme"
git push origin main --force
