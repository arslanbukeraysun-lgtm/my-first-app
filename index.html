<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRATHINK</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: white;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            /* ARKA PLAN BURADA - Dosya adını screenshots yaptık */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('screenshots.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; cursor: pointer;
        }
        #splash-screen h1 { font-size: 3.5rem; color: #ff0000; text-shadow: 0 0 30px rgba(255,0,0,0.6); }
        #main-ui { display: none; width: 100%; padding: 20px; }
        #timer-display { font-size: 5.5rem; font-weight: bold; margin-bottom: 25px; }
        .btn-main { background-color: #ff0000; color: white; border: none; padding: 18px 45px; font-size: 1.1rem; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 20px rgba(255,0,0,0.5); }
        .btn-stop { background-color: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 12px 25px; border-radius: 30px; cursor: pointer; margin-top: 10px; }
        .music-panel { margin-top: 40px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="splash-screen" onclick="startApp()">
        <h1>ULTRATHINK</h1>
        <p>BAŞLAMAK İÇİN DOKUN</p>
    </div>
    <div id="main-ui">
        <div id="task-display" style="font-weight: bold; color: #38bdf8; margin-bottom: 10px;">GÖREV BEKLENİYOR...</div>
        <div id="timer-display">00:00</div>
        <button class="btn-main" onclick="generateTask()">YENİ GÖREV AL</button><br>
        <button class="btn-stop" id="pause-btn" onclick="togglePause()">DURDUR</button>
        <div class="music-panel">
            <p id="current-song">🎵 Odaklanma Müziği</p>
            <button onclick="changeSong()" style="background: none; border: 1px solid #38bdf8; color: #38bdf8; padding: 5px 10px; border-radius: 10px; cursor: pointer;">ŞARKI DEĞİŞTİR</button>
        </div>
    </div>
    <audio id="bg-audio" loop><source id="audio-src" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <script>
        const tasks = [
            {t: "20 Matematik Sorusu Çöz", d: 25}, {t: "Fen Bilgisi Özetini Oku", d: 15},
            {t: "10 İngilizce Kelime Ezberle", d: 10}, {t: "15 Sayfa Kitap Oku", d: 20},
            {t: "10 Dakika Masanı Düzenle", d: 10}, {t: "5 Dakika Gözlerini Dinlendir", d: 5}
        ];
        let timeLeft = 0, timerId = null, isPaused = false;
        const audio = document.getElementById('bg-audio');
        function startApp() { document.getElementById('splash-screen').style.display = 'none'; document.getElementById('main-ui').style.display = 'block'; audio.play(); }
        function generateTask() {
            if(timerId) clearInterval(timerId);
            const r = tasks[Math.floor(Math.random() * tasks.length)];
            document.getElementById('task-display').innerText = r.t;
            timeLeft = r.d * 60; isPaused = false; startTimer();
        }
        function startTimer() {
            timerId = setInterval(() => {
                if(!isPaused && timeLeft > 0) {
                    timeLeft--;
                    let m = Math.floor(timeLeft/60), s = timeLeft%60;
                    document.getElementById('timer-display').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                }
            }, 1000);
        }
        function togglePause() { isPaused = !isPaused; document.getElementById('pause-btn').innerText = isPaused ? "DEVAM ET" : "DURDUR"; }
        function changeSong() { audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"; audio.load(); audio.play(); }
    </script>
</body>
</html>
